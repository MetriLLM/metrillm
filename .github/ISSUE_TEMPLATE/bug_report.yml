name: Bug report
description: Report a reproducible bug in MetriLLM CLI
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve MetriLLM.
        Please fill in the details below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: Clear and concise description of what is wrong.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact CLI commands and inputs.
      placeholder: |
        1. Run `metrillm bench --model ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error output if possible.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MetriLLM version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.18.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: e.g. macOS 15.3 arm64
    validations:
      required: true
  - type: input
    id: ollama
    attributes:
      label: Ollama version
      placeholder: e.g. 0.5.x
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, benchmark IDs, related issues, etc.
